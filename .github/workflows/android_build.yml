name: Build Android APK Success Final
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm init -y
          npm install --force @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications
          mkdir -p www

      - name: Build Android Structure
        run: |
          npx cap add android || echo "Exists"
          mkdir -p android/app/
          cp google-services.json android/app/
          npx cap sync android

      - name: Fix Manifest and Build Tools
        # هذا الجزء يحل خطأ processDebugMainManifest عبر إضافة الأذونات والخدمات المطلوبة برمجياً
        run: |
          sed -i 's/compileSdkVersion = 30/compileSdkVersion = 33/g' android/variables.gradle
          sed -i 's/targetSdkVersion = 30/targetSdkVersion = 33/g' android/variables.gradle
          # إضافة الأذونات لملف المانيفست
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Chat-Working
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
