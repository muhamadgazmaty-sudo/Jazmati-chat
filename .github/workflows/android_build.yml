name: Build Android APK Final Fix
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean and Install
        run: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create WWW Dir
        run: mkdir -p www

      - name: Reset Android Platform
        # قمنا بإضافة أمر مسح المجلد القديم لضمان عدم وجود تعارض
        run: |
          rm -rf android
          npx cap add android

      - name: Inject Firebase Config
        # نسخ الملف الذي تأكدنا من وجوده في الصورة الأخيرة
        run: cp google-services.json android/app/

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Final-Chat
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
