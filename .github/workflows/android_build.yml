name: Build Android APK Final Success
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Install Dependencies
        # تجاوز تعارض الإصدارات الذي ظهر سابقاً
        run: |
          npm init -y
          npm install --force @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create Structure
        run: |
          mkdir -p www
          npx cap add android || echo "Exists"

      - name: Inject Firebase Config
        run: |
          mkdir -p android/app/
          cp google-services.json android/app/

      - name: Update Android Settings
        # هذا الأمر يضيف صلاحية الإشعارات لملف النظام تلقائياً
        run: |
          npx cap sync android
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Chat-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
