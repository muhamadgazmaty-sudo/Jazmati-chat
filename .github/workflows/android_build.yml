name: Build Android APK Final Force
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Essential Setup
        # إنشاء ملف package.json إذا لم يكن موجوداً لضمان عمل التحميل
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Prepare Workspace
        # مسح شامل لأي مخلفات قديمة تسبب التعارض
        run: |
          mkdir -p www
          rm -rf android
          rm -rf node_modules
          npm install

      - name: Build Android Structure
        # إضافة المنصة من الصفر
        run: npx cap add android

      - name: Inject Firebase Secret
        # نسخ ملفك الموجود في الصورة 1000050505.jpg لمكانه الصحيح
        run: |
          mkdir -p android/app/
          cp google-services.json android/app/

      - name: Sync and Compile
        # ربط الكود وتوليد ملف الـ APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Application
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Ultimate-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
