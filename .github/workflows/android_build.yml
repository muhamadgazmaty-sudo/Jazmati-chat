name: Build Android Last Hope
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Reset
        # سنقوم بحذف أي ملفات أندرويد قديمة تسبب التعارض
        run: |
          npm install --force
          rm -rf android
          mkdir -p www

      - name: Create Fresh Android
        # إنشاء هيكل أندرويد جديد متوافق مع المكتبات الحالية
        run: |
          npx cap add android
          cp google-services.json android/app/
          npx cap sync android

      - name: Final Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Final-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
