name: Build Android Final Success
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Reset
        run: |
          npm install --force
          rm -rf android
          mkdir -p www

      - name: Create Fresh Android
        run: |
          npx cap add android
          cp google-services.json android/app/
          npx cap sync android

      - name: Force Enable Notifications
        # هذه الأسطر هي التي ستحل مشكلة "لا يمكن تفعيل الإشعارات"
        run: |
          # إضافة الأذونات المطلوبة لأندرويد 13 فما فوق
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />' android/app/src/main/AndroidManifest.xml
          # ترقية إصدارات البناء لتتوافق مع الأذونات الجديدة
          sed -i 's/compileSdkVersion = 30/compileSdkVersion = 33/g' android/variables.gradle
          sed -i 's/targetSdkVersion = 30/targetSdkVersion = 33/g' android/variables.gradle

      - name: Final Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Download Working APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Final-Notifications
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
