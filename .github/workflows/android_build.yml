name: Build Android APK Final Fix
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Initialize and Install
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create WWW Dir
        run: mkdir -p www

      - name: Add Android Platform
        # قمنا بإضافة || true ليتجاوز الخطأ إذا كانت المنصة مضافة مسبقاً
        run: npx cap add android || echo "Android already exists"

      - name: Inject Firebase Config
        # هذا السطر سيحاول النسخ، وإذا فشل لن يوقف البناء بل سيكمل
        run: |
          mkdir -p android/app/
          cp google-services.json android/app/ || echo "Warning: google-services.json not found in root"

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
