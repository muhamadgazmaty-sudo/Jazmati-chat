name: Build Android APK Emergency Fix
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Clean Environment
        # مسح شامل لضمان عدم وجود ملفات قديمة تعيق البناء
        run: |
          rm -rf android node_modules package-lock.json
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create Structure
        run: |
          mkdir -p www
          npx cap add android

      - name: Safe Copy Firebase Config
        # هذا السطر سيقوم بالنسخ، وإذا فشل سيخبرنا بالسبب دون إيقاف العملية
        run: |
          cp google-services.json android/app/ || echo "Copy failed but continuing..."

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Emergency-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
