name: Build Android APK with Notifications Fixed
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Force Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create Dummy WWW Dir
        run: mkdir -p www

      - name: Add Android Platform
        run: npx cap add android || true

      - name: Copy Firebase Config
        # هذا السطر مهم جداً لكي يعمل Firebase
        run: cp google-services.json android/app/ || echo "File missing!"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Notifications-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
