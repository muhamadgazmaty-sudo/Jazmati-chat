name: Build Android APK Final Fix
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean and Force Install
        # أضفنا --force لتجاوز خطأ eresolve الذي ظهر في الصورة
        run: |
          rm -rf node_modules package-lock.json
          npm install --force @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications

      - name: Create Structure
        run: |
          mkdir -p www
          npx cap add android || echo "Already exists"

      - name: Inject Firebase Config
        # نسخ ملف google-services.json الذي تأكدنا من وجوده
        run: |
          mkdir -p android/app/
          cp google-services.json android/app/ || echo "File not found"

      - name: Sync and Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Chat-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
