name: Build Android APK Final Success
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Fix Permissions
        # تثبيت المكتبات وإجبار النظام على قبول الإشعارات
        run: |
          npm init -y
          npm install --force @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications
          mkdir -p www

      - name: Add and Sync Android
        run: |
          npx cap add android || echo "Exists"
          mkdir -p android/app/
          cp google-services.json android/app/
          npx cap sync android

      - name: Inject Push Notifications to AndroidManifest
        # هذا السطر يحل مشكلة الـ Build Failed عبر إضافة الأذونات برمجياً
        run: |
          sed -i '/<\/header>/a \    <service android:name="com.capacitorjs.plugins.pushnotifications.MessagingService" android:exported="false"><intent-filter><action android:name="com.google.firebase.MESSAGING_EVENT" /></intent-filter></service>' android/app/src/main/AndroidManifest.xml

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export APK Success
        uses: actions/upload-artifact@v4
        with:
          name: Jazmati-Chat-Ready
          path: android/app/build/outputs/apk/debug/app-debug.apk
 
